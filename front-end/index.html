<!DOCTYPE html>
<html lang="pt-BR" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- Fontes baseadas no design/rules -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icones baseados no design/rules -->
  <link rel="shortcut icon" href="/ICONE.png" type="image/png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#001a33">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SoftHub">
  <link rel="apple-touch-icon" href="/ICONE.png">
  <title>Fábrica de Software - Unieuro</title>

  <!-- Silenciador de Ruído de Extensões (ChatGPT, DeepSeek, etc) -->
  <script>
    (function () {
      /**
       * SILENCIADOR DE RUÍDO DE EXTENSÕES
       * Bloqueia erros gritantes causados por extensões (OneTab, Session Buddy, etc)
       * que injetam 'vendor.js' ou tentam comunicação via tabs.
       */
      const RUIDO = [
        'tabs:outgoing.message.ready',
        'Could not establish connection',
        'Receiving end does not exist',
        'The message port closed before a response',
        'React DevTools',
        'extension',
        'internal-error',
        'onMessage',
        'vendor.js',
        'vendor' // Bloqueio total do termo vendor no console
      ];

      const deveFiltrar = (m) => {
        if (!m) return false;
        try {
          const texto = typeof m === 'string' ? m : (m.message || m.reason?.message || String(m));
          return RUIDO.some(r => texto.toLowerCase().includes(r.toLowerCase()));
        } catch {
          return false;
        }
      };

      // 1. Intercepta erros globais e rejeições de promessa
      const purificar = (e) => {
        const erro = e.error || e.reason || e;
        if (deveFiltrar(erro)) {
          e.stopImmediatePropagation();
          if (e.preventDefault) e.preventDefault();
          return true;
        }
      };

      window.addEventListener('unhandledrejection', purificar, true);
      window.addEventListener('error', purificar, true);

      // 2. Limpeza total de logs e avisos
      const originalError = console.error;
      const originalWarn = console.warn;
      const originalLog = console.log;

      console.error = function (...args) {
        if (args.some(arg => deveFiltrar(arg))) return;
        originalError.apply(console, args);
      };

      console.warn = function (...args) {
        if (args.some(arg => deveFiltrar(arg))) return;
        originalWarn.apply(console, args);
      };
      
      console.log = function (...args) {
        if (args.some(arg => deveFiltrar(arg))) return;
        originalLog.apply(console, args);
      };

      // 3. Blindagem de Rede
      const originalFetch = window.fetch;
      window.fetch = function(...args) {
        return originalFetch.apply(this, args).catch(err => {
          if (deveFiltrar(err)) return new Promise(() => {});
          throw err;
        });
      };
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
