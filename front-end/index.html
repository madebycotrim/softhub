<!DOCTYPE html>
<html lang="pt-BR" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- Fontes baseadas no design/rules -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icones baseados no design/rules -->
  <link rel="shortcut icon" href="/ICONE.png" type="image/png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#001a33">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SoftHub">
  <link rel="apple-touch-icon" href="/ICONE.png">
  <title>Fábrica de Software - Unieuro</title>

  <!-- Silenciador de Ruído de Extensões (ChatGPT, DeepSeek, etc) -->
  <script>
    (function () {
      const RUÍDO = [
        'tabs:outgoing.message.ready',
        'Could not establish connection',
        'Receiving end does not exist',
        'The message port closed before a response',
        'React DevTools'
      ];
      const filtrar = (m) => RUÍDO.some(r => String(m).includes(r));

      window.addEventListener('unhandledrejection', (e) => {
        const msg = e.reason?.message || e.reason;
        if (filtrar(msg)) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);

      const originalError = console.error;
      console.error = function (...args) {
        const msg = args.join(' ');
        if (filtrar(msg)) return;
        originalError.apply(console, args);
      };
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
