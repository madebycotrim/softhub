<!DOCTYPE html>
<html lang="pt-BR" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fontes baseadas no design/rules -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icones baseados no design/rules -->
  <link rel="shortcut icon" href="./public/ICONE.png" type="image/png">
  <title>Fábrica de Software - Unieuro</title>

  <!-- Silenciador de Ruído de Extensões (ChatGPT, DeepSeek, etc) -->
  <script>
    (function () {
      const RUÍDO = [
        'tabs:outgoing.message.ready',
        'Could not establish connection',
        'Receiving end does not exist',
        'The message port closed before a response'
      ];
      const filtrar = (m) => RUÍDO.some(r => String(m).includes(r));

      window.addEventListener('unhandledrejection', (e) => {
        if (filtrar(e.reason?.message || e.reason)) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);

      const originalError = console.error;
      console.error = function (...args) {
        if (filtrar(args.join(' '))) return;
        originalError.apply(console, args);
      };
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
